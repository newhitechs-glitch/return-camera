<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Camera — ระบบจัดการสินค้าส่งคืน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #5a0010;
  --red: #c0172b;
  --red-light: #e8203a;
  --red-glow: rgba(192,23,43,0.55);
  --text-w: #ffffff;
  --text-ws: rgba(255,255,255,0.75);
  --text-wm: rgba(255,255,255,0.55);
  --font: 'Prompt', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  background: #000;
  color: var(--text-w);
  font-family: var(--font);
  overflow: hidden;
}

.app {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* Header — fixed top */
.cam-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  background: linear-gradient(to bottom, rgba(0,0,0,0.92), rgba(0,0,0,0.50));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.cam-header .title {
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cam-header .title small {
  display: block;
  font-size: 10px;
  font-weight: 400;
  color: var(--text-ws);
  margin-top: 2px;
}
.cam-header .type-badge {
  display: inline-block;
  padding: 2px 8px;
  background: var(--red);
  border-radius: 99px;
  font-size: 10px;
  font-weight: 700;
  margin-left: 6px;
}
.cam-header .close-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  display: grid;
  place-items: center;
  cursor: pointer;
  flex-shrink: 0;
}
.cam-header .close-btn:active { transform: scale(0.92); }

/* Body — full screen */
.cam-body {
  flex: 1;
  position: relative;
  background: #000;
  overflow: hidden;
  width: 100%;
  height: 100%;
}
#video, #preview {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#preview { display: none; }
#previewVideo {
  position: absolute;
  inset: 0;
  width: 100% !important;
  height: 100% !important;
  object-fit: contain !important;
  background: #000;
  display: none;
}

.cam-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}
.cam-grid {
  position: absolute;
  top: 80px;
  bottom: 140px;
  left: 0;
  right: 0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.08) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 33.33% 33.33%;
}

.recording-indicator {
  position: fixed;
  top: calc(78px + env(safe-area-inset-top, 0px));
  left: 50%;
  transform: translateX(-50%);
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 16px 6px;
  background: rgba(220,38,38,0.95);
  border-radius: 14px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font);
  z-index: 55;
  box-shadow: 0 4px 16px rgba(220,38,38,0.50);
  min-width: 180px;
}
.recording-indicator.show { display: flex; }
.recording-indicator > span,
.recording-indicator > .red-dot { display: inline-block; }
.recording-indicator .red-dot {
  width: 8px; height: 8px;
  background: #fff;
  border-radius: 50%;
  animation: rec-pulse 1s ease-in-out infinite;
  margin-right: 6px;
  vertical-align: middle;
}
.recording-indicator .rec-max {
  font-size: 11px;
  opacity: 0.75;
  font-weight: 600;
  margin-left: 4px;
}
.recording-indicator .rec-progress {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.25);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 4px;
}
.recording-indicator .rec-progress-fill {
  height: 100%;
  background: #fff;
  width: 0%;
  border-radius: 99px;
  transition: width 0.2s linear;
}
.recording-indicator.warning {
  background: rgba(234,88,12,0.95);
  animation: rec-warn 0.5s ease-in-out infinite;
}
@keyframes rec-warn {
  0%, 100% { box-shadow: 0 4px 16px rgba(234,88,12,0.50); }
  50% { box-shadow: 0 4px 20px rgba(234,88,12,0.90); }
}
@keyframes rec-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.cam-loading {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  background: rgba(0,0,0,0.92);
  z-index: 100;
  text-align: center;
  padding: 20px;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(255,255,255,0.20);
  border-top-color: var(--red-light);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============ FOOTER — FIXED BOTTOM (สำคัญ!) ============ */
.cam-footer {
  position: fixed !important;
  bottom: 0 !important;
  left: 0 !important;
  right: 0 !important;
  z-index: 60 !important;
  padding: 18px 20px;
  padding-bottom: calc(18px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(to top, rgba(0,0,0,0.95) 30%, rgba(0,0,0,0.50) 80%, transparent);
  display: flex !important;
  align-items: center !important;
  justify-content: space-around !important;
  gap: 16px;
}

/* Capture button — ใหญ่ ตรงกลาง */
.capture-btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #fff;
  border: 6px solid rgba(255,255,255,0.40);
  cursor: pointer;
  transition: all .12s;
  display: grid;
  place-items: center;
  position: relative;
  box-shadow: 0 6px 24px rgba(0,0,0,0.50);
  flex-shrink: 0;
}
.capture-btn::before {
  content: '';
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid #000;
}
.capture-btn:active { transform: scale(0.90); }
.capture-btn.recording {
  background: var(--red);
}
.capture-btn.recording::before {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: #fff;
  border: none;
}

.flip-btn, .gallery-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(0,0,0,0.65);
  border: 1.5px solid rgba(255,255,255,0.30);
  color: #fff;
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.flip-btn:active, .gallery-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.20); }

/* Preview action bar (เมื่อถ่ายแล้ว) */
.preview-actions {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 70;
  padding: 18px 20px;
  padding-bottom: calc(18px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(to top, rgba(0,0,0,0.95) 30%, transparent);
  align-items: center;
  justify-content: center;
}
.preview-actions.show { display: flex; gap: 14px; }

.preview-btn {
  padding: 14px 26px;
  border-radius: 99px;
  font-family: var(--font);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  border: 1.5px solid;
  transition: all .15s;
}
.preview-btn:active { transform: scale(0.95); }
.btn-retake {
  background: rgba(0,0,0,0.75);
  border-color: rgba(255,255,255,0.35);
  color: #fff;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.btn-confirm {
  background: linear-gradient(135deg, #4ade80, #16a34a);
  border-color: #4ade80;
  color: #064e3b;
  font-weight: 800;
  box-shadow: 0 6px 20px rgba(34,197,94,0.45);
}

.error-msg {
  padding: 20px;
  text-align: center;
  color: #fca5a5;
}
.error-msg .fallback-btn {
  margin-top: 14px;
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.30);
  color: #fff;
  padding: 11px 22px;
  border-radius: 11px;
  cursor: pointer;
  font-family: var(--font);
  font-weight: 600;
  font-size: 13px;
}
</style>
</head>
<body>
<div class="app">
  <header class="cam-header">
    <div class="title">
      <div>
        <div id="titleText">กล้อง</div>
        <small>ถ่ายเสร็จกด ✓ จะส่งกลับอัตโนมัติ</small>
      </div>
      <span class="type-badge" id="typeBadge">PHOTO</span>
    </div>
    <button class="close-btn" onclick="closeWindow()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </header>
  
  <div class="cam-body">
    <video id="video" autoplay playsinline muted></video>
    <img id="preview" alt="preview">
    <video id="previewVideo" controls></video>
    
    <div class="cam-overlay">
      <div class="cam-grid"></div>
    </div>
    
    <div class="recording-indicator" id="recIndicator">
      <span class="red-dot"></span>
      <span id="recTimer">REC 00:00</span>
      <span class="rec-max" id="recMaxLabel">/ 01:00</span>
      <div class="rec-progress"><div class="rec-progress-fill" id="recProgressFill"></div></div>
    </div>
  </div>
  
  <div class="cam-loading" id="loadingEl">
    <div>
      <div class="spinner"></div>
      <div style="font-weight:600;font-size:15px;">กำลังเปิดกล้อง...</div>
      <small style="opacity:.7;display:block;margin-top:6px;font-size:12px;">กรุณาอนุญาตการใช้กล้อง</small>
    </div>
  </div>
  
  <footer class="cam-footer" id="footer">
    <button class="flip-btn" id="flipBtn" title="สลับกล้อง">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><polyline points="16 16 19 19 22 16"/><polyline points="2 8 5 5 8 8"/></svg>
    </button>
    
    <button class="capture-btn" id="captureBtn" title="ถ่าย"></button>
    
    <button class="gallery-btn" id="galleryBtn" title="เลือกจากคลังภาพ">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
  </footer>
  
  <div class="preview-actions" id="previewActions">
    <button class="preview-btn btn-retake" onclick="retake()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M1 20l4.93-4.93A8.5 8.5 0 0 1 20.49 15"/></svg>
      ถ่ายใหม่
    </button>
    <button class="preview-btn btn-confirm" onclick="sendToOpener()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      ใช้รูปนี้
    </button>
  </div>
</div>

<script>
// ===== Parse query params =====
const params = new URLSearchParams(location.search);
const photoType = params.get('type') || 'photo';
const isVideo = photoType === 'video';

const labels = {
  product: 'รูปสินค้า',
  box: 'รูปกล่อง',
  label: 'รูปใบปะหน้า',
  video: 'วิดีโอเปิดกล่อง',
  photo: 'ถ่ายรูป'
};
document.getElementById('titleText').textContent = labels[photoType] || 'ถ่ายรูป';
document.getElementById('typeBadge').textContent = isVideo ? 'VIDEO' : 'PHOTO';

// ===== Camera =====
let stream = null;
let currentFacing = 'environment';
let capturedData = null;
let capturedMime = null;
let mediaRecorder = null;
let recordChunks = [];
let recordStartTime = 0;
let recordTimerId = null;
const MAX_VIDEO_SECONDS = 60;

const video = document.getElementById('video');
const preview = document.getElementById('preview');
const previewVideo = document.getElementById('previewVideo');
const loadingEl = document.getElementById('loadingEl');
const previewActions = document.getElementById('previewActions');
const captureBtn = document.getElementById('captureBtn');
const recIndicator = document.getElementById('recIndicator');
const recTimer = document.getElementById('recTimer');
const footer = document.getElementById('footer');

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    const constraints = {
      audio: isVideo,
      video: {
        facingMode: { ideal: currentFacing },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    await video.play();
    loadingEl.style.display = 'none';
  } catch (err) {
    loadingEl.innerHTML = '<div class="error-msg">'
      + '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:block;margin:0 auto 14px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
      + '<div style="font-weight:700;font-size:15px;margin-bottom:6px;">เปิดกล้องไม่ได้</div>'
      + '<small style="opacity:.75;font-size:12px;">' + (err.message || err) + '</small><br>'
      + '<button class="fallback-btn" onclick="openFilePicker()">เลือกจากคลังภาพแทน</button>'
      + '</div>';
  }
}

// ============ SHUTTER SOUND (Web Audio API) ============
let audioCtx = null;
function playShutterSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const now = audioCtx.currentTime;
    const sr = audioCtx.sampleRate;
    
    // เสียงชัตเตอร์ iPhone — "ti-tick" สั้น คม สะอาด (2 click เร็ว ๆ)
    function iClick(startTime, freq, dur, vol) {
      // ใช้ sine + noise นิดหน่อย ให้คมแบบ digital
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, startTime);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.6, startTime + dur);
      
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, startTime);
      g.gain.linearRampToValueAtTime(vol, startTime + 0.002);  // attack เร็วมาก
      g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
      
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(startTime);
      osc.stop(startTime + dur);
      
      // เติม high-freq tick ให้คม
      const len = Math.floor(sr * 0.012);
      const buf = audioCtx.createBuffer(1, len, sr);
      const ch = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 4);
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 4000;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(vol * 0.5, startTime);
      ng.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.012);
      noise.connect(hp);
      hp.connect(ng);
      ng.connect(audioCtx.destination);
      noise.start(startTime);
      noise.stop(startTime + 0.012);
    }
    
    // iPhone shutter: 2 click เร็ว ๆ ระยะห่าง 45ms
    iClick(now, 2200, 0.035, 0.30);          // click แรก (สูง)
    iClick(now + 0.045, 1600, 0.045, 0.34);  // click สอง (ต่ำกว่าเล็กน้อย ยาวกว่า)
  } catch (err) {
    console.warn('Shutter sound failed:', err);
  }
}

// ============ FLASH EFFECT ============
function flashScreen() {
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:9999;opacity:0;pointer-events:none;transition:opacity .12s;';
  document.body.appendChild(flash);
  requestAnimationFrame(() => {
    flash.style.opacity = '0.85';
    setTimeout(() => {
      flash.style.opacity = '0';
      setTimeout(() => flash.remove(), 200);
    }, 60);
  });
}

function takePhoto() {
  // เสียงชัตเตอร์ + flash ทันทีเมื่อกดปุ่ม
  playShutterSound();
  flashScreen();
  
  const canvas = document.createElement('canvas');
  const w = video.videoWidth;
  const h = video.videoHeight;
  const maxSize = 1280;
  let cw = w, ch = h;
  if (w > maxSize || h > maxSize) {
    if (w > h) { ch = (h / w) * maxSize; cw = maxSize; }
    else { cw = (w / h) * maxSize; ch = maxSize; }
  }
  canvas.width = cw;
  canvas.height = ch;
  canvas.getContext('2d').drawImage(video, 0, 0, cw, ch);
  capturedData = canvas.toDataURL('image/jpeg', 0.85);
  capturedMime = 'image/jpeg';
  showPreview('image');
}

function startRecording() {
  recordChunks = [];
  try {
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
  } catch (e) {
    try { mediaRecorder = new MediaRecorder(stream); }
    catch (e2) { alert('เบราว์เซอร์ไม่รองรับการบันทึกวิดีโอ'); return; }
  }
  
  mediaRecorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) recordChunks.push(e.data);
  };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordChunks, { type: mediaRecorder.mimeType || 'video/webm' });
    const reader = new FileReader();
    reader.onload = () => {
      capturedData = reader.result;
      capturedMime = blob.type;
      showPreview('video');
    };
    reader.readAsDataURL(blob);
  };
  
  mediaRecorder.start();
  recordStartTime = Date.now();
  captureBtn.classList.add('recording');
  recIndicator.classList.add('show');
  
  recordTimerId = setInterval(() => {
    const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
    const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const ss = String(elapsed % 60).padStart(2, '0');
    recTimer.textContent = 'REC ' + mm + ':' + ss;
    
    // Update progress bar
    const pct = Math.min((elapsed / MAX_VIDEO_SECONDS) * 100, 100);
    const fill = document.getElementById('recProgressFill');
    if (fill) fill.style.width = pct + '%';
    
    // เตือนเมื่อเหลือ ≤10 วินาที
    if (elapsed >= MAX_VIDEO_SECONDS - 10) {
      recIndicator.classList.add('warning');
    } else {
      recIndicator.classList.remove('warning');
    }
    
    if (elapsed >= MAX_VIDEO_SECONDS) stopRecording();
  }, 200);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  captureBtn.classList.remove('recording');
  recIndicator.classList.remove('show', 'warning');
  const fill = document.getElementById('recProgressFill');
  if (fill) fill.style.width = '0%';
  if (recordTimerId) { clearInterval(recordTimerId); recordTimerId = null; }
}

function showPreview(kind) {
  if (kind === 'image') {
    video.style.display = 'none';
    preview.style.display = 'block';
    preview.src = capturedData;
    previewVideo.style.display = 'none';
  } else {
    video.style.display = 'none';
    preview.style.display = 'none';
    previewVideo.style.display = 'block';
    previewVideo.src = capturedData;
  }
  footer.style.display = 'none';
  previewActions.classList.add('show');
}

function retake() {
  capturedData = null;
  capturedMime = null;
  video.style.display = 'block';
  preview.style.display = 'none';
  previewVideo.style.display = 'none';
  previewVideo.src = '';
  footer.style.display = 'flex';
  previewActions.classList.remove('show');
}

function sendToOpener() {
  if (!capturedData) return;
  if (window.opener && !window.opener.closed) {
    try {
      window.opener.postMessage({
        type: 'photo-capture',
        photoType: photoType,
        mime: capturedMime,
        data: capturedData
      }, '*');
    } catch (e) { console.error(e); }
  }
  setTimeout(closeWindow, 200);
}

function closeWindow() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  window.close();
  setTimeout(() => {
    document.body.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#fff;font-family:Mitr,sans-serif;height:100vh;display:grid;place-items:center;background:#000;"><div><div style="font-size:48px;margin-bottom:16px;">✓</div><div style="font-size:18px;font-weight:700;">เสร็จแล้ว</div><div style="opacity:.6;margin-top:10px;font-size:13px;">คุณสามารถปิดแท็บนี้ได้</div></div></div>';
  }, 300);
}

captureBtn.addEventListener('click', () => {
  if (isVideo) {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') startRecording();
    else stopRecording();
  } else {
    takePhoto();
  }
});

document.getElementById('flipBtn').addEventListener('click', () => {
  currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
  startCamera();
});

function openFilePicker() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = isVideo ? 'video/*' : 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      capturedData = reader.result;
      capturedMime = file.type;
      showPreview(isVideo ? 'video' : 'image');
    };
    reader.readAsDataURL(file);
  };
  input.click();
}
document.getElementById('galleryBtn').addEventListener('click', openFilePicker);

window.addEventListener('DOMContentLoaded', startCamera);
</script>
</body>
</html>
